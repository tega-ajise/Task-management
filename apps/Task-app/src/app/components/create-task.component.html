<div
  id="task-container"
  class="max-w-[450px] mx-auto p-6 border rounded-lg bg-[#fafafa] shadow-md"
>
  <h2>Create Task</h2>

  <!-- Each form group is a section -->
  <form (ngSubmit)="editingId ? updateTask() : addTask()">
    <div class="mb-4">
      <label for="title" class="block font-bold mb-1">Title</label>
      <input
        class="w-full p-2 border rounded-sm border-[#ccc]"
        type="text"
        id="title"
        [(ngModel)]="task.title"
        name="title"
        required
      />
    </div>

    <div class="mb-4">
      <label for="content" class="block font-bold mb-1">To Do</label>
      <textarea
        class="w-full p-2 border rounded-sm border-[#ccc]"
        id="content"
        [(ngModel)]="task.todo"
        name="content"
      ></textarea>
    </div>

    <div class="mb-4">
      <label for="dueDate" class="block font-bold mb-1">Due Date</label>
      <input
        class="w-full p-2 border rounded-sm border-[#ccc]"
        type="date"
        id="dueDate"
        [(ngModel)]="task.dueDate"
        name="dueDate"
      />
    </div>

    <button
      class="mt-2 px-4 py-2 border-0 rounded-sm bg-blue-600 text-white cursor-pointer hover:bg-blue-900"
      type="submit"
    >
      {{ editingId ? 'Update Task' : 'Add Task' }}
    </button>
  </form>
</div>

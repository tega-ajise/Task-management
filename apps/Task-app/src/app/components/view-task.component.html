<div class="mx-auto mt-10 w-full max-w-5xl px-4">
  <div class="mb-4 flex items-center justify-between">
    <h2 class="text-2xl font-semibold text-gray-900">Your Tasks</h2>
    <a
      class="inline-flex items-center rounded-lg bg-indigo-600 px-4 py-2 text-white shadow-sm hover:bg-indigo-700"
      routerLink="/tasks/new"
    >
      + Create Task
    </a>
  </div>

  <div
    *ngIf="loading"
    class="rounded-lg border border-gray-200 bg-white p-6 text-gray-600 shadow-sm"
  >
    Loading…
  </div>
  <div
    *ngIf="error"
    class="rounded-lg border border-red-200 bg-red-50 p-4 text-red-700"
  >
    {{ error }}
  </div>

  <ul *ngIf="!loading && !error && tasks.length > 0" class="grid gap-3">
    <li
      *ngFor="let t of tasks"
      class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm transition hover:shadow-md"
    >
      <a [routerLink]="['/tasks', t.id]">
        <div class="mb-1 flex items-center justify-between">
          <strong class="text-lg text-gray-900">{{ t.title }}</strong>
          <span class="text-sm text-gray-500">
            Owner: {{ t.owner.displayName }}
          </span>
        </div>

        <p class="whitespace-pre-wrap text-gray-700">{{ t.todo }}</p>

        <div class="flex items-center justify-between">
          <div *ngIf="t.dueDate" class="mt-2 text-sm text-gray-500">
            Due: {{ t.dueDate | date : 'mediumDate' }}
          </div>
          <button
            (click)="onDelete(t, $event)"
            class="ml-3 rounded-md bg-red-600 px-3 py-1 text-sm text-white hover:bg-red-700 z-20"
          >
            Delete
          </button>
        </div>
      </a>
    </li>
  </ul>

  <p
    *ngIf="!loading && !error && tasks.length === 0"
    class="rounded-lg border border-gray-200 bg-white p-6 text-center text-gray-600"
  >
    No tasks to show.
  </p>
</div>
